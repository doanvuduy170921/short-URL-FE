server {
    listen 80;
    server_name localhost;

    # Đường dẫn đến nơi chứa file tĩnh bên trong container
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Cấu hình sinh tử để React Router SPA không bị lỗi 404 khi F5 trang
        try_files $uri $uri/ /index.html;
    }

    # 1. Bật nén Gzip: Giúp Nginx nén nhỏ các file JS/CSS trước khi gửi qua internet
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # 2. Cấu hình Cache trình duyệt: Giúp máy khách không phải tải lại các file tĩnh giống nhau
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Cấu hình trang báo lỗi mặc định
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}